<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ТехноПрогресс — Пользователи</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e2761 0%, #2d3a8c 100%);
      min-height: 100vh;
      color: #1a1a2e;
      padding: 24px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; color: #fff;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #4a6cf7, #6d8bff);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
    }
    .brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .brand p { font-size: 13px; opacity: 0.75; }
    .badge {
      background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px;
      font-size: 13px; display: flex; align-items: center; gap: 7px;
      backdrop-filter: blur(10px);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #38d39f; box-shadow: 0 0 8px #38d39f; }
    .card {
      background: #fff; border-radius: 18px; padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25); margin-bottom: 20px;
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .card-head h2 { font-size: 19px; color: #1e2761; }
    .count-pill { background: #eef1fd; color: #4a6cf7; padding: 5px 13px; border-radius: 14px; font-size: 13px; font-weight: 600; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; margin-bottom: 24px; }
    input {
      padding: 13px 16px; border: 1.5px solid #e3e8f4; border-radius: 11px;
      font-size: 15px; transition: all 0.2s; outline: none;
    }
    input:focus { border-color: #4a6cf7; box-shadow: 0 0 0 3px rgba(74,108,247,0.12); }
    button {
      background: linear-gradient(135deg, #4a6cf7, #5a7bff); color: #fff; border: none;
      padding: 13px 24px; border-radius: 11px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; white-space: nowrap;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(74,108,247,0.35); }
    button:active { transform: translateY(0); }
    .user-list { display: flex; flex-direction: column; gap: 12px; }
    .user-item {
      display: flex; align-items: center; gap: 16px; padding: 16px;
      background: #f8faff; border-radius: 13px; border: 1px solid #eef1fd;
      transition: all 0.2s; animation: slideIn 0.3s ease;
    }
    .user-item:hover { background: #eef3ff; transform: translateX(3px); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .avatar {
      width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #fff;
    }
    .user-info { flex: 1; }
    .user-info .name { font-size: 16px; font-weight: 600; color: #1a1a2e; }
    .user-info .email { font-size: 13.5px; color: #7a8294; margin-top: 2px; }
    .user-id { font-size: 12px; color: #b0b8c9; font-weight: 600; }
    .empty { text-align: center; padding: 40px; color: #9aa3b5; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
    .footer-note { text-align: center; color: rgba(255,255,255,0.6); font-size: 12.5px; margin-top: 8px; }
    .api-link { color: rgba(255,255,255,0.85); text-decoration: none; border-bottom: 1px dotted rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="brand-logo">Т</div>
        <div>
          <h1>ТехноПрогресс</h1>
          <p>Сервис управления пользователями</p>
        </div>
      </div>
      <div class="badge"><span class="dot"></span> User Service • Node.js</div>
    </header>

    <div class="card">
      <div class="card-head">
        <h2>Добавить пользователя</h2>
      </div>
      <div class="form-row">
        <input type="text" id="name" placeholder="Имя пользователя">
        <input type="email" id="email" placeholder="Электронная почта">
        <button onclick="addUser()">Добавить</button>
      </div>

      <div class="card-head">
        <h2>Пользователи</h2>
        <span class="count-pill" id="count">0</span>
      </div>
      <div class="user-list" id="list"></div>
    </div>

    <div class="footer-note">
      API доступно по адресу <a class="api-link" href="/api/users">/api/users</a>
    </div>
  </div>

  <script>
    const colors = [
      ['#4a6cf7','#6d8bff'], ['#f7674a','#ff8b6d'], ['#38d39f','#5ee0b5'],
      ['#9b59b6','#bd7fd6'], ['#f39c12','#ffb74d'], ['#1abc9c','#48d1b8']
    ];
    function colorFor(id) { return colors[id % colors.length]; }
    function initials(name) {
      return name.trim().split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase() || '?';
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/users');
        const users = await res.json();
        const list = document.getElementById('list');
        document.getElementById('count').textContent = users.length;
        if (users.length === 0) {
          list.innerHTML = '<div class="empty"><div class="empty-icon">👤</div>Пока нет пользователей.<br>Добавьте первого через форму выше.</div>';
          return;
        }
        list.innerHTML = users.map(u => {
          const [c1, c2] = colorFor(u.id);
          return `
            <div class="user-item">
              <div class="avatar" style="background:linear-gradient(135deg,${c1},${c2})">${initials(u.name)}</div>
              <div class="user-info">
                <div class="name">${escapeHtml(u.name)}</div>
                <div class="email">${escapeHtml(u.email)}</div>
              </div>
              <div class="user-id">#${u.id}</div>
            </div>`;
        }).join('');
      } catch (e) {
        document.getElementById('list').innerHTML = '<div class="empty">Не удалось загрузить данные. Проверьте подключение к базе.</div>';
      }
    }

    async function addUser() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!name || !email) { alert('Заполните имя и почту'); return; }
      await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email })
      });
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      loadUsers();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    loadUsers();
  </script>
</body>
</html>
